    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is liar's dice?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Liar's dice is a dice bluffing game where players bid on how many dice of a certain face value are hidden under all cups. Players take turns raising the bid or challenging (calling 'Dudo'). If challenged, all dice are revealed — if the bid was wrong, the bidder loses a die; if it was right, the challenger does. The last player with dice wins."
          }
        },
        {
          "@type": "Question",
          "name": "What is Perudo?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Perudo is the original South American liar's dice game, also known as Dudo or Cacho. It originated in the Andes and was popularised globally after Richard Borg's 1993 board game release. Dudo Dice is a free online version of Perudo."
          }
        },
        {
          "@type": "Question",
          "name": "How do you play liar's dice online?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Visit dudodice.com and choose Play vs Computer to play against AI opponents, or Play Online to join real-time multiplayer matches. No account or download required to play."
          }
        },
        {
          "@type": "Question",
          "name": "Are 1s wild in liar's dice?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes — in standard play, 1s count as any face value. For example, a bid of '4 fives' is satisfied by all 5s plus all 1s. The exception is Palifico mode: when a player down to exactly 1 die starts a round, ones lose their wild status for that round only."
          }
        },
        {
          "@type": "Question",
          "name": "Can I play liar's dice for free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes — Dudo Dice is completely free to play in your browser. No download, no account required. Play single-player vs AI or real-time multiplayer."
          }
        },
        {
          "@type": "Question",
          "name": "What does Dudo mean?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Dudo means 'I doubt it' in Spanish. Calling Dudo challenges the previous player's bid — all dice are revealed and counted. If the bid was wrong, the bidder loses a die. If it was correct, the challenger loses a die."
          }
        }
      ]
    }
    </script>
