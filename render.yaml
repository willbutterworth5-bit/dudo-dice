services:
  - type: web
    name: dudo-dice
    runtime: node
    plan: free
    buildCommand: rm -f package-lock.json && npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false   # Set this secret in the Render dashboard
      - key: SUPABASE_SERVICE_KEY
        sync: false   # Set this secret in the Render dashboard
